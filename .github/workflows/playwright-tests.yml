name: Playwright Tests

on:
  push:
    branches: ["**"]
    paths:
      - "playwrite/**"
      - ".github/workflows/playwright-tests.yml"
  pull_request:
    paths:
      - "playwrite/**"
      - ".github/workflows/playwright-tests.yml"

jobs:
  test:
    name: Run Hello World Playwright Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playwrite

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Run Playwright tests
        run: uv run pytest -v --tb=short 2>&1 | tee test-results.txt
        continue-on-error: false

      - name: Upload screenshot artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-screenshots
          path: playwrite/screenshots/*.png
          if-no-files-found: warn
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: playwrite/test-results.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Report test status
        if: always()
        run: |
          echo "### Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f test-results.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat test-results.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
